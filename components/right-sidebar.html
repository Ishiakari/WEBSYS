<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/right-sidebar.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F5F5F5;
        }
        .right-sidebar {
            display: block !important;
            width: 100% !important;
            padding: 20px;
            background-color: #F5F5F5;
            border-left: none;
        }
    </style>
</head>
<body>
    <aside class="right-sidebar">
        <div class="analytics-card">
            <div class="card-header">
                <h3>Customer Analytic</h3>
                <span class="more-icon">...</span>
            </div>
    <div class="donut-chart">
        <svg viewBox="0 0 200 200" class="chart">
            <circle cx="100" cy="100" r="80" fill="none" stroke="#E0E0E0" stroke-width="30"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="#5B93FF" stroke-width="30" 
                    stroke-dasharray="150 502" stroke-dashoffset="0" transform="rotate(-90 100 100)"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="#FFD66B" stroke-width="30" 
                    stroke-dasharray="200 502" stroke-dashoffset="-150" transform="rotate(-90 100 100)"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="#FF8F6B" stroke-width="30" 
                    stroke-dasharray="152 502" stroke-dashoffset="-350" transform="rotate(-90 100 100)"/>
        </svg>
    </div>
    <div class="chart-legend">
        <div class="legend-item">
            <span class="legend-dot blue"></span>
            <span>New</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot yellow"></span>
            <span>Non-Purchasers</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot orange"></span>
            <span>Regular</span>
        </div>
    </div>
</div>

<div class="monthly-stats">
    <h3>Monthly Customer Count</h3>
    <div class="bar-chart">
        <div class="bar-item">
            <span class="bar-label">Jan</span>
            <div class="bar-container">
                <div class="bar orange" style="width: 78%;"></div>
            </div>
            <span class="bar-value">23,400</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">Feb</span>
            <div class="bar-container">
                <div class="bar blue" style="width: 50%;"></div>
            </div>
            <span class="bar-value">15,000</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">Mar</span>
            <div class="bar-container">
                <div class="bar orange" style="width: 100%;"></div>
            </div>
            <span class="bar-value">30,000</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">Apr</span>
            <div class="bar-container">
                <div class="bar blue" style="width: 73%;"></div>
            </div>
            <span class="bar-value">22,000</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">May</span>
            <div class="bar-container">
                <div class="bar blue" style="width: 33%;"></div>
            </div>
            <span class="bar-value">10,000</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">Jun</span>
            <div class="bar-container">
                <div class="bar orange" style="width: 78%;"></div>
            </div>
            <span class="bar-value">23,400</span>
        </div>
        <div class="bar-item">
            <span class="bar-label">Jul</span>
            <div class="bar-container">
                <div class="bar blue" style="width: 17%;"></div>
            </div>
            <span class="bar-value">5,000</span>
        </div>
    </div>
</div>
    </aside>
</body>
</html>
