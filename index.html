<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pine Furniture - Customer Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <style>
        /* Iframe Layout nako part */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        .sidebar-frame {
            width: 220px;
            min-width: 220px;
            height: 100vh;
            border: none;
            border-right: 1px solid #E0E0E0;
        }
        .main-frame {
            flex: 1;
            height: 100vh;
            border: none;
        }
        .right-frame {
            width: 280px;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Left Sidebar -->
        <iframe src="components/sidebar.html" class="sidebar-frame"></iframe>
        
        <!-- Main Content -->
        <iframe src="components/main-content.html" class="main-frame"></iframe>
        
        <!-- Right Sidebar (Analytics) -->
        <iframe src="components/right-sidebar.html" class="right-frame"></iframe>
    </div>
</body>
</html>
